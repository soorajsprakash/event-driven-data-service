name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          PG_USER: user
          PG_PASSWORD: password
          PG_DB: test_db
          PG_HOST: localhost
          PG_PORT: 5432
          REDIS_HOST: redis://localhost
          REDIS_PORT: 6379
          KAFKA_TOPIC: test-topic
          KAFKA_PORT: 9092
          KAFKA_BROKERS_HOST: localhost
          PORT: 3000
          JWT_SECRET: ci-test-secret
