
services:
    postgres:
        image: postgres:15-alpine
        restart: unless-stopped
        environment:
            - PG_USER=${PG_USER:-user}
            - PG_PASSWORD=${PG_PASSWORD:-password}
            - PG_DB=${PG_DB:-is-assignment}
        volumes:
            - pgdata:/var/lib/postgresql/data
        ports:
            - "${PG_PORT:-5433}:5432"

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6380}:6379"

    zookeeper:
        image: bitnamilegacy/zookeeper:3.8
        restart: unless-stopped
        environment:
            - ALLOW_ANONYMOUS_LOGIN=yes

    kafka:
        image: bitnamilegacy/kafka:3.3.2
        restart: unless-stopped
        environment:
            - KAFKA_CFG_BROKER_ID=1
            - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
            - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
            - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:${KAFKA_PORT:-9092},PLAINTEXT_INTERNAL://kafka:29092
            - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
            - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT_INTERNAL
            - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - ALLOW_PLAINTEXT_LISTENER=yes
        ports:
            - "${KAFKA_PORT:-9092}:9092"
        depends_on:
            - zookeeper

volumes:
    pgdata:
